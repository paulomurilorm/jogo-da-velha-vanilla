<!doctype html>
<!---->
<html lang="en">
  <!---->
  <head>
    <!---->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JOGO DA VELHA</title>
    <link rel="icon" type="image/png" href="./frontend/img/favicon.png" />
    <link rel="stylesheet" href="./frontend/css/main.css" />
    <script type="module" src="./frontend/js/app.js" defer></script>
    <!---->
  </head>
  <!---->
  <body>
    <!---->
    <div id="containerMenu">
      <!---->
      <div id="container-titulo-botões" class="bordas-shadow">
        <!---->
        <h1>JOGO DA VELHA</h1>
        <!---->
        <div id="buttons-container">
          <!---->
          <button id="2-players" class="modo-jogo bordas-shadow">
            2 JOGADORES
          </button>

          <button id="ai-player" class="modo-jogo bordas-shadow">
            CONTRA IA
          </button>

          <button id="menu" class="bordas-shadow hide">MENU</button>
          <!---->
        </div>
        <!---->
      </div>
      <!---->
    </div>
    <!---->
    <div id="game-box">
      <!---->
      <div id="container-jogo" class="hide">
        <!---->
        <div class="box" id="block-1"></div>
        <div class="box" id="block-2"></div>
        <div class="box" id="block-3"></div>
        <div class="box" id="block-4"></div>
        <div class="box" id="block-5"></div>
        <div class="box" id="block-6"></div>
        <div class="box" id="block-7"></div>
        <div class="box" id="block-8"></div>
        <div class="box" id="block-9"></div>
        <!---->
        <div id="message" class="hide">
          <!---->
          <p></p>
          <!---->
        </div>
        <!---->
      </div>
      <!---->
    </div>
    <!---->
    <div id="container-score" class="bordas-shadow hide">
      <!---->
      <div id="scoreboard-container">
        <!---->
        <h2>PLACAR:</h2>

        <span class="score-box">
          <span id="x-scoreboard">X</span>:
          <span id="scoreboard-1">0</span>
        </span>

        <span class="score-box">
          <span id="o-scoreboard"></span>:
          <span id="scoreboard-2">0</span>
        </span>
        <!---->
      </div>
      <!---->
    </div>
    <!---->
    <div class="hide">
      <!---->
      <div class="x">X</div>

      <div class="o"></div>
      <!---->
    </div>
    <!---->
  </body>
  <!---->
</html>
